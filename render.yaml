services:
  - type: web
    name: staymatch-recommendation-service
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MSSQL_CONNECTION_STRING
        sync: false
      - key: API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        sync: false
      - key: PROPERTY_API_BASE_URL
        sync: false
      - key: PROPERTY_API_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SYNC_INTERVAL_MINUTES
        value: 5
